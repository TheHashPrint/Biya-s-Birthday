<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHALIMAR_NETWORK_v24</title>
    <style>
        body { 
            background: black; 
            color: #00FF41; 
            font-family: 'Courier New', monospace; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; 
            display: none;
            filter: brightness(0.3);
        }

        #terminal { 
            width: 90%; 
            max-width: 700px; 
            z-index: 1; 
            background: rgba(0, 0, 0, 0.7); 
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #004400;
        }

        .line { margin-bottom: 8px; line-height: 1.4; }
        .dots { color: #008f11; margin: 12px 0; font-weight: bold; }
        
        .choice-btn { 
            background: rgba(0, 0, 0, 0.8); 
            border: 1px solid #00FF41; 
            color: #00FF41; 
            padding: 12px 20px; 
            margin: 8px 0; 
            cursor: pointer; 
            font-family: inherit; 
            display: block; 
            width: 100%; 
            text-align: left;
        }
        .choice-btn:hover { background: #00FF41; color: black; }

        .final-choice-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 60px;
        }

        #no-btn { width: auto; padding: 10px 30px; white-space: nowrap; }
        #yes-btn { width: auto; padding: 10px 30px; }
        .hidden { display: none; }
        .system-msg { color: cyan; font-weight: bold; }
        .error-msg { color: #ff4444; font-weight: bold; }
        .emoticon { color: #fff; font-size: 1.2em; }
    </style>
</head>
<body>

<video id="bg-video" playsinline>
    <source src="chomu.ogg" type="video/ogg">
</video>

<div id="terminal">
    <div id="output"></div>
    <div id="input-area" class="hidden"></div>
</div>

<script>
    const output = document.getElementById('output');
    const inputArea = document.getElementById('input-area');
    const bgVideo = document.getElementById('bg-video');
    
    let clicked1 = false;
    let clicked2 = false;
    let trapTriggered = false;

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function type(text, speed = 30, cls = "line") {
        const l = document.createElement('div'); 
        l.className = cls; 
        output.appendChild(l);
        for (let i = 0; i < text.length; i++) { 
            l.innerHTML += text[i]; 
            await sleep(speed); 
        }
        return l;
    }

    async function printDots() { 
        await type("..........................................", 5, "dots"); 
    }

    async function init() {
        await type("> CONNECTING TO SHALIMAR_NETWORK...");
        await printDots();
        await type("> USER IDENTIFICATION REQUIRED");
        await type("> WHAT ICE CREAM WOULD I DEFFO GET YOU?");
        showOptions();
    }

    function showOptions() {
        inputArea.innerHTML = `
            <button class="choice-btn" onclick="handleChoice(1)">1) PARADISE</button>
            <button class="choice-btn" onclick="handleChoice(2)">2) WAFFLE'S NUTTY ICE CREAM</button>
            <button class="choice-btn" onclick="handleChoice(3)">3) NONE, YOU DON'T GET ICE CREAM</button>`;
        inputArea.classList.remove('hidden');
    }

    async function handleChoice(n) {
        inputArea.classList.add('hidden');
        if (n === 1) {
            await type("> SEARCHING FOR TASTE BUDS... FOUND.");
            await type("[SYSTEM]: CORRECT. SWEET, BUT BASIC.", 20, "system-msg");
            clicked1 = true;
        } else if (n === 2) {
            await type("[SYSTEM]: WRONG. YOU KNOW I'D ONLY BUY THIS TO SEE YOU GET ANNOYED.", 20, "error-msg");
            clicked2 = true;
        } else {
            await type("> SYSTEM ERROR: ACCESS DENIED.");
        }

        if (clicked1 && clicked2) {
            inputArea.classList.add('hidden');
            await sleep(800);
            unlockBiya();
        } else {
            await type("> SYSTEM: ADDITIONAL IDENTIFICATION REQUIRED.", 20, "cyan");
            inputArea.classList.remove('hidden');
        }
    }

    async function unlockBiya() {
        await printDots();
        await type("> USER IDENTIFIED: BIYA", 80);
        await printDots();
        await type("> ITS YOUR BIRTHDAY SO I MADE THIS FOR YOU.");
        await printDots();
        await type("> HAPPY BIRTHDAY <span class='emoticon'>◡̈</span>", 100);
        await sleep(1000);
        await type("> UNAUTHORIZED ACCESS MAY CAUSE EMOTIONAL DAMAGE. PROCEED?", 30, "error-msg");
        
        inputArea.innerHTML = `
            <div class="final-choice-container">
                <button class="choice-btn" id="yes-btn" onclick="moveToPhase2()">[ YES ]</button>
                <button class="choice-btn" id="no-btn" onmouseover="triggerTrap()">[ NO ]</button>
            </div>`;
        inputArea.classList.remove('hidden');
    }

    function triggerTrap() {
        const b = document.getElementById('no-btn');
        b.style.position = 'fixed';
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 100);
        b.style.left = x + 'px';
        b.style.top = y + 'px';

        if (!trapTriggered) {
            trapTriggered = true;
            bgVideo.style.display = "block";
            bgVideo.play();
            type("> ERROR: TRAP_PROTOCOL_ACTIVATED. PLAYING CHOMU.OGG...", 20, "error-msg");
        }
    }

    async function moveToPhase2() {
        inputArea.classList.add('hidden');
        await type("> ACCESS GRANTED. INITIALIZING DECRYPTION...", 30, "system-msg");
        await printDots();
        await type("> MOVING TO PHASE 2...", 100, "cyan");
        await sleep(2000);
        window.location.href = "phase2.html"; 
    }

    init();
</script>
</body>
</html>
